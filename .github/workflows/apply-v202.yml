name: Finalize FinanceOS 2.0.2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Finalize release
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/financeos-v202-ci.tar.gz
          tar -xzf /tmp/financeos-v202-ci.tar.gz
          find . -type f -name '._*' -delete
          rm -f .github/workflows/apply-v202.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize FinanceOS 2.0.2"
          git push origin main
