name: Bootstrap FinanceOS
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Restore FinanceOS V1
        run: |
          cat .bootstrap/archive.part1 .bootstrap/archive.part2 | base64 --decode > /tmp/financeos.tar.gz
          tar -xzf /tmp/financeos.tar.gz
          rm -rf .bootstrap .github/workflows/bootstrap.yml
          git config user.name "FinanceOS Release"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Release FinanceOS v1.0.0"
          git push origin HEAD:main
