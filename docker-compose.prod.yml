name: finance-os

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Définir POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Définir POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD}
    volumes:
      - financeos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${FINANCE_OS_API_IMAGE:?Définir FINANCE_OS_API_IMAGE}:${FINANCE_OS_VERSION:?Définir FINANCE_OS_VERSION}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?Définir JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  finance-os:
    image: ${FINANCE_OS_IMAGE:?Définir FINANCE_OS_IMAGE}:${FINANCE_OS_VERSION:?Définir FINANCE_OS_VERSION}
    restart: unless-stopped
    ports:
      - "${FINANCE_OS_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started

volumes:
  financeos-db:
    name: financeos-db
