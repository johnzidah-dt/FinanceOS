name: Apply FinanceOS 2.0.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assemble release archive
        run: cat .release-parts/part-* | base64 -d | gzip -d | tar -xf -

      - name: Commit clean release
        run: |
          rm -rf .release-parts .github/workflows/release-bootstrap.yml
          git checkout HEAD -- .github/workflows/container.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release FinanceOS 2.0.1"
          git tag -a v2.0.1 -m "FinanceOS 2.0.1"
          git push origin main
          git push origin v2.0.1
