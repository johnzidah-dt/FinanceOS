name: finance-os

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financeos}
      POSTGRES_USER: ${POSTGRES_USER:-financeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - financeos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeos} -d ${POSTGRES_DB:-financeos}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  api:
    image: ${FINANCE_OS_API_IMAGE:-finance-os-api}:${FINANCE_OS_VERSION:-2.0.2}
    build:
      context: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-financeos}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-financeos}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    security_opt:
      - no-new-privileges:true

  finance-os:
    image: ${FINANCE_OS_IMAGE:-finance-os}:${FINANCE_OS_VERSION:-2.0.2}
    build:
      context: .
      args:
        APP_VERSION: ${FINANCE_OS_VERSION:-2.0.2}
        VCS_REF: ${VCS_REF:-local}
        SOURCE_URL: ${SOURCE_URL:-local}
    restart: unless-stopped
    ports:
      - "${FINANCE_OS_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

volumes:
  financeos-db:
    name: financeos-db
