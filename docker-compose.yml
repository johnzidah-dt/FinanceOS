name: finance-os

services:
  finance-os:
    image: ${FINANCE_OS_IMAGE:-finance-os}:${FINANCE_OS_VERSION:-1.0.0}
    build:
      context: .
      args:
        APP_VERSION: ${FINANCE_OS_VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-local}
        SOURCE_URL: ${SOURCE_URL:-local}
    restart: unless-stopped
    ports:
      - "${FINANCE_OS_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
