name: Apply FinanceOS 2.0.2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Apply release
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/financeos-v202.tar.gz
          tar -xzf /tmp/financeos-v202.tar.gz
          rm -f .github/workflows/apply-v202.yml
          rm -rf .github/workflows/.github
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release FinanceOS 2.0.2"
          git tag -a v2.0.2 -m "FinanceOS 2.0.2"
          git push origin main
          git push origin v2.0.2
