name: finance-os

services:
  finance-os:
    image: ${FINANCE_OS_IMAGE:?Définir FINANCE_OS_IMAGE}:${FINANCE_OS_VERSION:?Définir FINANCE_OS_VERSION}
    restart: unless-stopped
    ports:
      - "${FINANCE_OS_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

