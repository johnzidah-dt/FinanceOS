name: Bootstrap FinanceOS 2.0.0
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Restore FinanceOS 2.0.0
        run: |
          cat .bootstrap-v2/archive.part1 .bootstrap-v2/archive.part2 | base64 --decode > /tmp/financeos-v2.tar.gz
          tar -xzf /tmp/financeos-v2.tar.gz
          rm -rf .bootstrap-v2 .github/workflows/bootstrap-v2.yml
          git checkout HEAD -- .github/workflows/container.yml
          git config user.name "FinanceOS Release"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Release FinanceOS 2.0.0"
          git push origin HEAD:main
