name: Bootstrap FinanceOS
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore FinanceOS V1
        env:
          ARCHIVE_B64: ""
        run: |
          printf '%s' "$ARCHIVE_B64" | base64 --decode > /tmp/financeos.tar.gz
          tar -xzf /tmp/financeos.tar.gz
          rm -f .github/workflows/bootstrap.yml
          git config user.name "FinanceOS Release"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Release FinanceOS v1.0.0"
          git push origin HEAD:main
